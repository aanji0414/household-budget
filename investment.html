<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>투자 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:         #f0f2f5;
  --bg2:        #ffffff;
  --bg3:        #f8f9fc;
  --surface:    #ffffff;
  --border:     #e4e7ec;
  --text:       #101828;
  --text2:      #475467;
  --text3:      #98a2b3;
  --accent:     #3b82f6;
  --accent-bg:  #eff6ff;
  --green:      #10b981;
  --green-bg:   #ecfdf5;
  --red:        #ef4444;
  --red-bg:     #fef2f2;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
  --shadow-md:  0 4px 16px rgba(0,0,0,.08);
  --radius:     16px;
  --radius-sm:  10px;
  --font:       'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  --nav-h:      60px;
  --bottom-h:   68px;
}
[data-theme="dark"] {
  --bg:         #0d1117;
  --bg2:        #161b22;
  --bg3:        #1c2230;
  --surface:    #1c2230;
  --border:     #2d3748;
  --text:       #f0f6fc;
  --text2:      #8b949e;
  --text3:      #6e7681;
  --accent:     #58a6ff;
  --accent-bg:  #0d2136;
  --green:      #3fb950;
  --green-bg:   #0d1f12;
  --red:        #f85149;
  --red-bg:     #1f0d0d;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.3);
  --shadow-md:  0 4px 16px rgba(0,0,0,.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  transition: background .2s, color .2s;
}

/* ── 로그인 ── */
#login-screen {
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
  padding: 24px;
}
.login-card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 24px;
  padding: 48px 40px;
  text-align: center;
  max-width: 400px; width: 100%;
}
.login-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px; font-size: 28px;
}
.login-card h1 { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 8px; }
.login-card p  { font-size: 14px; color: rgba(255,255,255,.5); margin-bottom: 36px; }
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 14px 20px;
  background: #fff; border: none; border-radius: 12px;
  font-family: var(--font); font-size: 15px; font-weight: 600; color: #1a1a2e;
  cursor: pointer; transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}
.btn-google:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.2); }
.btn-google img { width: 20px; height: 20px; }

/* ── 앱 레이아웃 ── */
#app { display: none; }

.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  box-shadow: var(--shadow-sm);
}
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo-icon {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.nav-logo span { font-size: 16px; font-weight: 800; }
.nav-actions { display: flex; align-items: center; gap: 4px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: background .15s;
}
.icon-btn:hover { background: var(--bg3); }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  object-fit: cover; cursor: pointer; border: 2px solid var(--border);
}

/* 계좌 필터 바 */
.account-bar {
  position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 90;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 10px 16px;
  gap: 8px; overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch; touch-action: pan-x;
}
.account-bar::-webkit-scrollbar { display: none; }
.acc-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: 99px;
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text2);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: all .15s;
  flex-shrink: 0;
}
.acc-chip.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.acc-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.acc-add-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px dashed var(--border);
  background: transparent; color: var(--text3);
  cursor: pointer; font-size: 18px; flex-shrink: 0;
  transition: all .15s;
}
.acc-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 페이지 */
.page-wrap {
  padding-top: calc(var(--nav-h) + 52px);
  padding-bottom: calc(var(--bottom-h) + 12px);
  max-width: 900px; margin: 0 auto;
}
.section { padding: 16px 16px 0; }

/* 하단 탭 */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: var(--bottom-h);
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 8px 0; border: none; background: none;
  cursor: pointer; color: var(--text3); font-family: var(--font);
  font-size: 11px; font-weight: 500; border-radius: 12px; transition: color .2s;
}
.tab-item .material-icons-round { font-size: 22px; }
.tab-item.active { color: var(--accent); }

/* FAB */
.fab {
  position: fixed; bottom: calc(var(--bottom-h) + 16px); right: 20px;
  width: 50px; height: 50px; border-radius: 16px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  border: none; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; box-shadow: 0 4px 20px rgba(59,130,246,.45);
  transition: transform .2s; z-index: 90;
}
.fab:hover { transform: translateY(-2px) scale(1.04); }
.fab:active { transform: scale(.96); }

/* 카드 */
.card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden;
}
.card + .card { margin-top: 12px; }

/* 요약 카드 */
.summary-card {
  background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
  border-radius: var(--radius); padding: 22px 20px; color: #fff;
  position: relative; overflow: hidden; margin-bottom: 12px;
}
.summary-card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; background: rgba(59,130,246,.15); border-radius: 50%;
}
.summary-label { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 6px; }
.summary-amount { font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 18px; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.summary-item { background: rgba(255,255,255,.08); border-radius: 10px; padding: 11px 14px; }
.summary-item-label { font-size: 11px; color: rgba(255,255,255,.5); margin-bottom: 3px; }
.summary-item-value { font-size: 15px; font-weight: 700; }
.pos { color: #34d399; }
.neg { color: #f87171; }
.neu { color: rgba(255,255,255,.9); }

/* 보유 종목 */
.holding-item {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .15s;
}
.holding-item:last-child { border-bottom: none; }
.holding-item:hover { background: var(--bg3); }
.holding-icon {
  width: 42px; height: 42px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; flex-shrink: 0;
}
.holding-info { flex: 1; min-width: 0; }
.holding-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.holding-sub  { font-size: 12px; color: var(--text3); }
.holding-right { text-align: right; flex-shrink: 0; }
.holding-value { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.holding-pnl  { font-size: 12px; font-weight: 600; }
.tag {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 7px; border-radius: 6px; margin-top: 2px;
}
.tag-stock  { background: var(--accent-bg); color: var(--accent); }
.tag-etf    { background: #f0fdf4; color: #15803d; }
.tag-crypto { background: #fff7ed; color: #c2410c; }
.tag-other  { background: var(--bg3); color: var(--text2); }
[data-theme="dark"] .tag-etf    { background: #0d1f12; color: #4ade80; }
[data-theme="dark"] .tag-crypto { background: #1c1107; color: #fb923c; }

/* 차트 */
.chart-wrap { padding: 16px 18px; }
.chart-legend { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.category-heatmap { position: relative; width: 100%; border-radius: 8px; overflow: hidden; }
.heatmap-tile-item:hover .heatmap-hover-label { opacity: 1 !important; }
.legend-item { display: flex; align-items: center; gap: 10px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-name { flex: 1; font-size: 13px; font-weight: 500; }
.legend-pct  { font-size: 13px; font-weight: 700; color: var(--text2); }

/* 섹션 헤더 */
.section-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}
.section-head h2 { font-size: 15px; font-weight: 800; }
.link-btn { font-size: 13px; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; }

/* 탭 페이지 */
.tab-page { display: none; }
.tab-page.active { display: block; }

/* 빈 상태 */
.empty-state { text-align: center; padding: 40px 24px; }
.empty-state .material-icons-round { font-size: 44px; color: var(--text3); margin-bottom: 10px; }
.empty-state h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.empty-state p  { font-size: 13px; color: var(--text3); }

/* 모달 */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 600px; max-height: 90dvh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,1,.23,1);
  padding-bottom: env(safe-area-inset-bottom);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 12px auto 0; }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 0;
}
.modal-title { font-size: 18px; font-weight: 800; }
.modal-body { padding: 18px 20px; }
.modal-footer {
  padding: 12px 20px 20px; display: flex; gap: 10px;
  border-top: 1px solid var(--border);
}

/* 폼 */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; }
.form-input, .form-select {
  width: 100%; padding: 11px 13px;
  background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: var(--font);
  font-size: 15px; color: var(--text); transition: border-color .15s; outline: none;
}
.form-input:focus, .form-select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.12);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* 버튼 */
.btn {
  flex: 1; padding: 13px 20px; border-radius: 12px; border: none;
  font-family: var(--font); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(.98); }
.btn-primary   { background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; }
.btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-danger    { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,.2); }

/* 상세 모달 */
.detail-summary { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 14px; }
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; }
.detail-row + .detail-row { border-top: 1px solid var(--border); }
.detail-key { font-size: 13px; color: var(--text3); }
.detail-val { font-size: 14px; font-weight: 700; }

/* 계좌 관리 리스트 */
.acc-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
}
.acc-item:last-child { border-bottom: none; }
.acc-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.acc-name { flex: 1; font-size: 15px; font-weight: 600; }
.acc-del-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: var(--red-bg); color: var(--red); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}

/* 필터 칩 */
.filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; -webkit-overflow-scrolling: touch; touch-action: pan-x; }
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 13px; border-radius: 99px; border: 1.5px solid var(--border);
  background: var(--surface); font-family: var(--font); font-size: 13px;
  font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all .15s;
}
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* 수익률 순위 */
.rank-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; border-bottom: 1px solid var(--border);
}
.rank-item:last-child { border-bottom: none; }
.rank-num {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: var(--text2); flex-shrink: 0;
}

/* 로딩 */
.spinner {
  width: 26px; height: 26px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--accent);
  animation: spin .6s linear infinite; margin: 36px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

@media (min-width: 600px) {
  .page-wrap { padding: calc(var(--nav-h) + 52px + 16px) 20px 100px; }
  .section { padding: 0 0 16px; }
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📈</div>
    <h1>투자 기록</h1>
    <p>나만의 포트폴리오를 스마트하게 관리하세요</p>
    <button class="btn-google" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      Google로 시작하기
    </button>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <!-- 상단 nav -->
  <nav class="top-nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">📈</div>
      <span>투자 기록</span>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" onclick="openSnapshotModal()" title="스냅샷 저장">
        <span class="material-icons-round">photo_camera</span>
      </button>
      <button class="icon-btn" onclick="openAccountMgmt()" title="계좌 관리">
        <div style="position:relative;width:22px;height:22px;display:flex;align-items:center;justify-content:center;">
          <span class="material-icons-round" style="font-size:20px">account_balance</span>
          <span class="material-icons-round" style="font-size:11px;position:absolute;bottom:-2px;right:-4px;background:var(--surface);border-radius:50%;color:var(--text2);line-height:1;">settings</span>
        </div>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="다크모드 전환">
        <span class="material-icons-round" id="theme-icon">dark_mode</span>
      </button>
      <img id="user-avatar" class="avatar" src="" alt="" onclick="showUserMenu()" onerror="this.style.display='none'">
    </div>
  </nav>

  <!-- 계좌 필터 바 -->
  <div class="account-bar" id="account-bar">
    <button class="acc-chip active" data-id="all" onclick="selectAccount('all', this)">전체</button>
    <button class="acc-add-btn" onclick="openAccountMgmt()" title="계좌 추가">
      <span class="material-icons-round" style="font-size:16px">add</span>
    </button>
  </div>

  <!-- 페이지 -->
  <div class="page-wrap">

    <!-- 홈 -->
    <div id="page-dashboard" class="tab-page active">
      <div class="section">
        <div class="summary-card">
          <div class="summary-label" id="summary-acc-label">전체 포트폴리오</div>
          <div class="summary-amount" id="total-value">₩0</div>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-item-label">총 투자금액</div>
              <div class="summary-item-value neu" id="total-invest">₩0</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">예수금</div>
              <div class="summary-item-value neu" id="total-cash">₩0</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">평가손익</div>
              <div class="summary-item-value neu" id="total-pnl">₩0</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">수익률</div>
              <div class="summary-item-value neu" id="total-rate">0.00%</div>
            </div>
          </div>
        </div>

        <!-- 전체/계좌별 동적 영역 -->
        <div id="dashboard-middle" style="margin-top:16px;"></div>
      </div>
    </div>

    <!-- 보유 종목 -->
    <div id="page-holdings" class="tab-page">
      <div class="section">
        <div class="filter-row">
          <button class="chip active" onclick="filterHoldings('all', this)">전체</button>
          <button class="chip" onclick="filterHoldings('나스닥100', this)">나스닥100</button>
          <button class="chip" onclick="filterHoldings('S&P500', this)">S&P500</button>
          <button class="chip" onclick="filterHoldings('금', this)">금</button>
          <button class="chip" onclick="filterHoldings('반도체', this)">반도체</button>
          <button class="chip" onclick="filterHoldings('AI', this)">AI</button>
          <button class="chip" onclick="filterHoldings('배당', this)">배당</button>
          <button class="chip" onclick="filterHoldings('비트코인', this)">비트코인</button>
          <button class="chip" onclick="filterHoldings('개별주', this)">개별주</button>
          <button class="chip" onclick="filterHoldings('ETF', this)">ETF</button>
          <button class="chip" onclick="filterHoldings('채권', this)">채권</button>
        </div>
        <div class="card" id="holdings-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- 분석 -->
    <div id="page-analysis" class="tab-page">
      <div class="section">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
import {
  getFirestore, collection, doc, getDocs, addDoc, setDoc, updateDoc, deleteDoc, query, orderBy
} from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBu1IfdRLE3cBAo5TIB4fF7g0s3L-kLukY",
  authDomain:        "household-budget-8107e.firebaseapp.com",
  projectId:         "household-budget-8107e",
  storageBucket:     "household-budget-8107e.firebasestorage.app",
  messagingSenderId: "966030958183",
  appId:             "1:966030958183:web:ac49ff11494dff985b6c89"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── 상태 ──
let uid = null;
let holdings     = [];
let accounts     = [];
let snapshots    = [];
let currentAccountFilter = 'all';
let currentHoldingId     = null;
let holdingCatFilter     = 'all';
let chartInstance     = null;
let catChartInstance  = null;
let pnlChartInstance  = null;
let trendChartInstance       = null;
let monthlyTrendChartInstance = null;

const COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899','#f97316','#6366f1','#14b8a6'];
const ACC_COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899','#f97316'];

const CATEGORIES = ['나스닥100','S&P500','금','반도체','AI','배당','비트코인','개별주','ETF','채권'];
const CAT_COLORS = {
  '나스닥100': '#3b82f6',
  'S&P500':    '#6366f1',
  '금':        '#f59e0b',
  '반도체':    '#8b5cf6',
  'AI':        '#06b6d4',
  '배당':      '#10b981',
  '비트코인':  '#f97316',
  '개별주':    '#ec4899',
  'ETF':       '#14b8a6',
  '채권':      '#84cc16',
  '기타':      '#98a2b3',
};

// ── 로그인 ──
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { alert('로그인 실패: ' + e.message); }
};
window.showUserMenu = () => { if (confirm('로그아웃 하시겠어요?')) signOut(auth); };

onAuthStateChanged(auth, async user => {
  if (user) {
    uid = user.uid;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const av = document.getElementById('user-avatar');
    if (user.photoURL) { av.src = user.photoURL; av.style.display = ''; }
    await loadAll();
  } else {
    uid = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ── Firestore refs ──
const holdingsRef  = () => collection(db, 'users', uid, 'investments');
const accountsRef  = () => collection(db, 'users', uid, 'invest_accounts');
const snapshotsRef = () => collection(db, 'users', uid, 'invest_snapshots');

// ── 데이터 로드 ──
async function loadAll() {
  const [hs, as, ss] = await Promise.all([
    getDocs(holdingsRef()),
    getDocs(accountsRef()),
    getDocs(query(snapshotsRef(), orderBy('date', 'asc')))
  ]);
  holdings  = hs.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>((b.currentPrice||b.avgPrice||0)*(b.quantity||0))-((a.currentPrice||a.avgPrice||0)*(a.quantity||0)));
  accounts  = as.docs.map(d => ({ id: d.id, ...d.data() }));
  // 같은 분기 라벨 중 최신(createdAt 기준) 것만 남기고 나머지는 Firestore에서도 삭제
  const allSnaps = ss.docs.map(d => ({ id: d.id, ...d.data() }));
  const labelMap = {};
  allSnaps.forEach(s => {
    const prev = labelMap[s.label];
    if (!prev || (s.createdAt||'') > (prev.createdAt||'')) {
      if (prev) deleteDoc(doc(db,'users',uid,'invest_snapshots', prev.id));
      labelMap[s.label] = s;
    } else {
      deleteDoc(doc(db,'users',uid,'invest_snapshots', s.id));
    }
  });
  snapshots = Object.values(labelMap).sort((a,b) => a.date.localeCompare(b.date));
  renderAll();
}

function renderAll() {
  renderAccountBar();
  renderSummary();
  renderHoldings();
  renderDashboardMiddle();
}

// ── 계좌 필터 바 ──
function renderAccountBar() {
  const bar = document.getElementById('account-bar');
  const chips = accounts.map(a => {
    const color = accColor(a.id);
    return `<button class="acc-chip${currentAccountFilter===a.id?' active':''}" data-id="${a.id}" onclick="selectAccount('${a.id}', this)">
      <span class="dot" style="background:${color};width:7px;height:7px;border-radius:50%;display:inline-block;"></span>
      ${a.name}
    </button>`;
  }).join('');
  bar.innerHTML = `
    <button class="acc-chip${currentAccountFilter==='all'?' active':''}" data-id="all" onclick="selectAccount('all',this)">전체</button>
    ${chips}
    <button class="acc-add-btn" onclick="openAccountMgmt()" title="계좌 추가">
      <span class="material-icons-round" style="font-size:16px">add</span>
    </button>`;
  // 계좌명 요약 업데이트
  const accName = currentAccountFilter === 'all' ? '전체 포트폴리오'
    : (accounts.find(a=>a.id===currentAccountFilter)?.name || '') + ' 포트폴리오';
  document.getElementById('summary-acc-label').textContent = accName;
  // 계좌 선택 드롭다운 갱신
  const sel = document.getElementById('f-account');
  const cur = sel.value;
  sel.innerHTML = '<option value="">계좌를 선택하세요</option>' +
    accounts.map(a => `<option value="${a.id}"${a.id===cur?' selected':''}>${a.name}</option>`).join('');
}

window.selectAccount = (id, btn) => {
  currentAccountFilter = id;
  renderAll();
};

// ── 필터된 보유 종목 ──
function filteredHoldings() {
  let arr = holdings;
  if (currentAccountFilter !== 'all') arr = arr.filter(h => h.accountId === currentAccountFilter);
  return arr;
}

// ── 요약 ──
function renderSummary() {
  const arr = filteredHoldings();
  let totalInvest = 0, totalValue = 0;
  arr.forEach(h => {
    totalInvest += (h.avgPrice||0) * (h.quantity||0);
    totalValue  += (h.currentPrice||h.avgPrice||0) * (h.quantity||0);
  });
  // 예수금 합산 (선택된 계좌 기준)
  const filteredAccs = currentAccountFilter === 'all' ? accounts : accounts.filter(a=>a.id===currentAccountFilter);
  const totalCash = filteredAccs.reduce((s,a)=>(s + (a.cash||0)), 0);

  const pnl  = totalValue - totalInvest;
  const rate = totalInvest > 0 ? pnl/totalInvest*100 : 0;
  const sign = pnl >= 0 ? '+' : '';
  const cls  = pnl > 0 ? 'pos' : pnl < 0 ? 'neg' : 'neu';
  document.getElementById('total-value').textContent   = fmt(totalValue + totalCash);
  document.getElementById('total-invest').textContent  = fmt(totalInvest);
  document.getElementById('total-cash').textContent    = fmt(totalCash);
  document.getElementById('total-pnl').textContent     = sign + fmt(pnl);
  document.getElementById('total-pnl').className       = 'summary-item-value ' + cls;
  document.getElementById('total-rate').textContent    = sign + rate.toFixed(2) + '%';
  document.getElementById('total-rate').className      = 'summary-item-value ' + cls;
}

// ── 보유 종목 (전체 탭) ──
function renderHoldings() {
  const list = document.getElementById('holdings-list');
  let arr = filteredHoldings();
  if (holdingCatFilter !== 'all') arr = arr.filter(h => h.category === holdingCatFilter);
  if (!arr.length) {
    list.innerHTML = `<div class="empty-state">
      <span class="material-icons-round">inbox</span>
      <h3>보유 종목이 없어요</h3>
      <p>+ 버튼으로 종목을 추가하세요</p>
    </div>`; return;
  }
  list.innerHTML = arr.map(h => holdingItemHTML(h)).join('');
}

// ── 대시보드 보유 종목 (최대 5개) ──

function holdingItemHTML(h) {
  const invest = (h.avgPrice||0)*(h.quantity||0);
  const value  = (h.currentPrice||h.avgPrice||0)*(h.quantity||0);
  const pnl    = value - invest;
  const rate   = invest > 0 ? pnl/invest*100 : 0;
  const sign   = pnl >= 0 ? '+' : '';
  const color  = pnl > 0 ? 'var(--green)' : pnl < 0 ? 'var(--red)' : 'var(--text2)';
  const catColor = CAT_COLORS[h.category] || CAT_COLORS['기타'];
  const accName  = accounts.find(a=>a.id===h.accountId)?.name || '';
  return `<div class="holding-item" onclick="openDetail('${h.id}')">
    <div class="holding-icon" style="background:${catColor}20;color:${catColor}">${(h.name||'?')[0]}</div>
    <div class="holding-info">
      <div class="holding-name">${h.name}</div>
      <div class="holding-sub">${h.quantity}주 · 평균 ${fmtCur(h.avgPrice||0, h.currency)}${accName?` · ${accName}`:''}</div>
      <span class="tag" style="background:${catColor}18;color:${catColor}">${h.category||'기타'}</span>
    </div>
    <div class="holding-right">
      <div class="holding-value">${fmtCur(value, h.currency)}</div>
      <div class="holding-pnl" style="color:${color}">${sign}${fmtCur(pnl, h.currency)} (${sign}${rate.toFixed(2)}%)</div>
    </div>
  </div>`;
}

// ── 차트 ──
function renderChart() {
  const arr   = filteredHoldings();
  const empty = document.getElementById('chart-empty');
  if (!arr.length) {
    if (empty) empty.style.display = 'block';
    const cv = document.getElementById('portfolio-chart');
    const lg = document.getElementById('chart-legend');
    const hm = document.getElementById('category-heatmap');
    if (cv) cv.style.display = 'none';
    if (lg) lg.innerHTML = '';
    if (hm) hm.innerHTML = '';
    return;
  }
  if (empty) empty.style.display = 'none';

  if (currentAccountFilter === 'all') {
    // 전체 탭: 카테고리별 히트맵
    renderCategoryHeatmap(arr);
  } else {
    // 계좌 탭: 종목별 도넛 차트
    const canvas = document.getElementById('portfolio-chart');
    const legend = document.getElementById('chart-legend');
    if (!canvas) return;
    canvas.style.display = 'block';
    const data = arr.map(h=>({name:h.name,value:(h.currentPrice||h.avgPrice||0)*(h.quantity||0),cat:h.category}))
      .filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
    const total = data.reduce((s,d)=>s+d.value,0);
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(canvas, {
      type:'doughnut',
      data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.value),backgroundColor:data.map(d=>CAT_COLORS[d.cat]||CAT_COLORS['기타']),borderWidth:0,hoverOffset:5}]},
      options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${pctFmt(ctx.raw/total*100)}  ${numFmt(ctx.raw)}원`}}},animation:{duration:400}}
    });
    if (legend) legend.innerHTML = data.map(d=>`
      <div class="legend-item">
        <div class="legend-dot" style="background:${CAT_COLORS[d.cat]||CAT_COLORS['기타']}"></div>
        <span class="legend-name">${d.name}</span>
        <span class="legend-pct">${pctFmt(d.value/total*100)}</span>
      </div>`).join('');
  }
}

function treemapLayout(items, x, y, w, h) {
  if (!items.length) return [];
  if (items.length === 1) return [{ ...items[0], x, y, w, h }];
  const total = items.reduce((s,d) => s+d.value, 0);
  // binary split: find partition closest to 50/50 by value
  let bestI=1, bestDiff=Infinity, sum=0;
  for (let i=0; i<items.length-1; i++) {
    sum += items[i].value;
    const diff = Math.abs(sum - (total-sum));
    if (diff < bestDiff) { bestDiff=diff; bestI=i+1; }
  }
  const left=items.slice(0,bestI), right=items.slice(bestI);
  const lr = left.reduce((s,d)=>s+d.value,0) / total;
  if (w >= h) {
    const lw = Math.round(w*lr);
    return [...treemapLayout(left, x, y, lw, h), ...treemapLayout(right, x+lw, y, w-lw, h)];
  } else {
    const th = Math.round(h*lr);
    return [...treemapLayout(left, x, y, w, th), ...treemapLayout(right, x, y+th, w, h-th)];
  }
}

function renderCategoryHeatmap(arr) {
  const heatmap = document.getElementById('category-heatmap');
  if (!heatmap) return;

  const catMap = {};
  arr.forEach(h => {
    const cat   = h.category || '기타';
    const value = (h.currentPrice||h.avgPrice||0) * (h.quantity||0);
    catMap[cat] = (catMap[cat]||0) + value;
  });

  const entries = Object.entries(catMap)
    .map(([cat, value]) => ({ cat, value }))
    .filter(d => d.value > 0)
    .sort((a,b) => b.value - a.value);

  const total = entries.reduce((s,d) => s+d.value, 0);
  if (!total) { heatmap.innerHTML=''; return; }

  // 실제 렌더된 너비를 읽기 위해 다음 프레임으로 지연
  const doRender = () => {
    const W = heatmap.offsetWidth || heatmap.parentElement?.offsetWidth || 320;
    // 높이: 너비의 45% 고정비율 (최소 180, 최대 360)
    const H = Math.min(Math.max(Math.round(W * 0.45), 180), 360);
    heatmap.style.position = 'relative';
    heatmap.style.height   = H + 'px';
    heatmap._entries = entries;
    heatmap._total   = total;

    const tiles = treemapLayout(entries, 0, 0, W, H);
    const GAP = 3;

    heatmap.innerHTML = tiles.map(t => {
      const pct    = t.value / total * 100;
      const color  = CAT_COLORS[t.cat] || CAT_COLORS['기타'];
      const minDim = Math.min(t.w, t.h);
      const fs     = minDim < 50 ? 9 : t.w < 90 ? 11 : 14;
      const showLabel = minDim >= 30 && t.w >= 40;
      return `<div
        class="heatmap-tile-item"
        onclick="goToHoldingsCategory('${t.cat}')"
        title="${t.cat}  ${pct.toFixed(1)}%"
        style="
          position:absolute;
          left:${t.x + GAP}px; top:${t.y + GAP}px;
          width:${t.w - GAP*2}px; height:${t.h - GAP*2}px;
          background:${color};
          border-radius:6px;
          box-sizing:border-box;
          overflow:hidden;
          cursor:pointer;
          display:flex; flex-direction:column; justify-content:flex-end; padding:8px 8px 7px;">
        ${showLabel ? `
          <div style="font-size:${fs}px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.cat}</div>
          <div style="font-size:${Math.max(fs-1,9)}px;font-weight:600;color:rgba(255,255,255,.85);line-height:1.2;">${pct.toFixed(1)}%</div>
        ` : ''}
      </div>`;
    }).join('');
  };
  requestAnimationFrame(doRender);
}

    const v = (h.currentPrice||h.avgPrice||0)*(h.quantity||0);
    catMap[cat] = (catMap[cat]||0) + v;
  });

  if(catChartInstance) catChartInstance.destroy();

      type:'doughnut',

      options:{cutout:'60%',plugins:{legend:{display:false}},animation:{duration:400}}

  ).join('');

  const pnlData=arr.map(h=>{
    const invest=(h.avgPrice||0)*(h.quantity||0);
    const value=(h.currentPrice||h.avgPrice||0)*(h.quantity||0);
    return{name:h.name,pnl:value-invest,rate:invest>0?(value-invest)/invest*100:0};
  }).sort((a,b)=>b.rate-a.rate);

  if(pnlChartInstance) pnlChartInstance.destroy();
  if(pnlData.length){
    pnlChartInstance=new Chart(document.getElementById('pnl-chart'),{
      type:'bar',
      data:{labels:pnlData.map(d=>d.name),datasets:[{label:'수익률(%)',data:pnlData.map(d=>+d.rate.toFixed(2)),
        backgroundColor:pnlData.map(d=>d.rate>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),borderRadius:6,borderSkipped:false}]},
      options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(150,150,150,.08)'}},y:{grid:{display:false}}},animation:{duration:400}}
    });
  }
  document.getElementById('rank-list').innerHTML=pnlData.length?pnlData.map((d,i)=>{
    const color=d.rate>0?'var(--green)':d.rate<0?'var(--red)':'var(--text2)';
    const sign=d.rate>=0?'+':'';
    return`<div class="rank-item">
      <div class="rank-num">${i+1}</div>
      <div style="flex:1;font-size:14px;font-weight:600">${d.name}</div>
      <div style="font-size:15px;font-weight:800;color:${color}">${sign}${d.rate.toFixed(2)}%</div>
    </div>`;
  }).join(''):`<div class="empty-state"><span class="material-icons-round">emoji_events</span><h3>데이터가 없어요</h3></div>`;
}

window.openSnapshotModal = () => {

window.saveSnapshot = async () => {

  if (!label) { alert('라벨을 입력하세요'); return; }
  if (!date)  { alert('날짜를 선택하세요'); return; }
  const el = document.getElementById('snapshot-modal');
  const data = {
    label,
    date,
    accountFilter: 'all',
    totalAsset:  parseFloat(el.dataset.totalAsset),
    totalInvest: parseFloat(el.dataset.totalInvest),
    totalCash:   parseFloat(el.dataset.totalCash),
    pnl:         parseFloat(el.dataset.pnl),
    rate:        parseFloat(el.dataset.rate),
    createdAt:   new Date().toISOString(),
  };
  // 같은 분기 라벨이 있으면 덮어쓰기, 없으면 신규 추가
  const existing = snapshots.find(s => s.label === label);
  if (existing) {
    await setDoc(doc(db,'users',uid,'invest_snapshots', existing.id), data);
    Object.assign(existing, data);

    snapshots.push({ id: ref.id, ...data });

  snapshots.sort((a,b) => a.date.localeCompare(b.date));

};

window.submitHolding = async () => {
  const name     = document.getElementById('f-name').value.trim();
  const avgPrice = parseFloat(document.getElementById('f-avg-price').value);
  const qty      = parseFloat(document.getElementById('f-qty').value);
  const accountId = document.getElementById('f-account').value;
  if (!name)      { alert('종목명을 입력하세요'); return; }
  if (!avgPrice)  { alert('평균 매수가를 입력하세요'); return; }
  if (!qty)       { alert('보유 수량을 입력하세요'); return; }
  if (!accountId) { alert('계좌를 선택하세요'); return; }

  const curPriceInput = parseFloat(document.getElementById('f-current-price').value);
  const accountName   = accounts.find(a=>a.id===accountId)?.name || '';
  const data = {
    name, accountId, accountName,
    category:     document.getElementById('f-category').value,
    currency:     document.getElementById('f-currency').value,
    avgPrice,
    quantity:     qty,
    currentPrice: curPriceInput || avgPrice,
    memo:         document.getElementById('f-memo').value.trim(),
  };

  const editId = document.getElementById('edit-holding-id').value;
  if (editId) {
    await updateDoc(doc(db,'users',uid,'investments',editId), data);
    const idx = holdings.findIndex(h=>h.id===editId);
    if (idx>=0) holdings[idx] = { id:editId, ...data };
  } else {
    data.createdAt = new Date().toISOString();
    const ref = await addDoc(holdingsRef(), data);
    holdings.push({ id:ref.id, ...data });
    holdings.sort((a,b)=>((b.currentPrice||b.avgPrice||0)*(b.quantity||0))-((a.currentPrice||a.avgPrice||0)*(a.quantity||0)));
  }
  closeModalById('add-modal');
  renderAll();
};

// ── 종목 상세 ──
window.openDetail = id => {
  currentHoldingId = id;
  const h = holdings.find(x=>x.id===id);
  if (!h) return;
  document.getElementById('detail-title').textContent = h.name;
  const invest = (h.avgPrice||0)*(h.quantity||0);
  const value  = (h.currentPrice||h.avgPrice||0)*(h.quantity||0);
  const pnl    = value - invest;
  const rate   = invest > 0 ? pnl/invest*100 : 0;
  const color  = pnl>0?'var(--green)':pnl<0?'var(--red)':'var(--text2)';
  const sign   = pnl>=0?'+':'';
  const catMap = {stock:'주식',etf:'ETF',crypto:'코인',other:'기타'};
  const accName= accounts.find(a=>a.id===h.accountId)?.name||'미지정';
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-row"><span class="detail-key">계좌</span><span class="detail-val">${accName}</span></div>
    <div class="detail-row"><span class="detail-key">종목명</span><span class="detail-val">${h.name}</span></div>
    <div class="detail-row"><span class="detail-key">카테고리</span><span class="detail-val">${h.category||'기타'}</span></div>
    <div class="detail-row"><span class="detail-key">보유 수량</span><span class="detail-val">${h.quantity}주</span></div>
    <div class="detail-row"><span class="detail-key">평균 매수가</span><span class="detail-val">${fmtCur(h.avgPrice||0, h.currency)}</span></div>
    <div class="detail-row"><span class="detail-key">현재가</span><span class="detail-val">${fmtCur(h.currentPrice||h.avgPrice||0, h.currency)}</span></div>
    <div class="detail-row"><span class="detail-key">총 투자금액</span><span class="detail-val">${fmtCur(invest, h.currency)}</span></div>
    <div class="detail-row"><span class="detail-key">평가금액</span><span class="detail-val">${fmtCur(value, h.currency)}</span></div>
    <div class="detail-row"><span class="detail-key">평가손익</span><span class="detail-val" style="color:${color}">${sign}${fmtCur(pnl, h.currency)}</span></div>
    <div class="detail-row"><span class="detail-key">수익률</span><span class="detail-val" style="color:${color}">${sign}${rate.toFixed(2)}%</span></div>
    ${h.memo?`<div class="detail-row"><span class="detail-key">메모</span><span class="detail-val">${h.memo}</span></div>`:''}
  `;
  document.getElementById('current-price-input').value = h.currentPrice || h.avgPrice || '';
  document.getElementById('detail-modal').classList.add('open');
};

window.updateCurrentPrice = async () => {
  const price = parseFloat(document.getElementById('current-price-input').value);
  if (!price || !currentHoldingId) return;
  await updateDoc(doc(db,'users',uid,'investments',currentHoldingId), { currentPrice: price });
  const idx = holdings.findIndex(h=>h.id===currentHoldingId);
  if (idx>=0) holdings[idx].currentPrice = price;
  closeModalById('detail-modal');
  renderAll();
};

window.confirmDelete = async () => {
  if (!confirm('이 종목을 삭제할까요?')) return;
  await deleteDoc(doc(db,'users',uid,'investments',currentHoldingId));
  holdings = holdings.filter(h=>h.id!==currentHoldingId);
  closeModalById('detail-modal');
  renderAll();
};

// ── 계좌 관리 ──
window.openAccountMgmt = () => {
  renderAccountList();
  document.getElementById('new-acc-name').value = '';
  document.getElementById('account-modal').classList.add('open');
};

function renderAccountList() {
  const el = document.getElementById('account-list');
  if (!accounts.length) {
    el.innerHTML = `<div class="empty-state" style="padding:24px">
      <span class="material-icons-round">account_balance</span>
      <h3>계좌가 없어요</h3><p>위에서 계좌를 추가해보세요</p>
    </div>`; return;
  }
  el.innerHTML = accounts.map(a => {
    const cnt = holdings.filter(h=>h.accountId===a.id).length;
    return `<div class="acc-item" id="acc-row-${a.id}" style="flex-wrap:wrap;gap:8px;">
      <span class="acc-color-dot" style="background:${accColor(a.id)}"></span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;font-weight:600;">${a.name}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">
          ${cnt}종목 · 예수금 ${fmt(a.cash||0)}
        </div>
      </div>
      <button class="icon-btn" style="width:30px;height:30px;color:var(--text3)" onclick="startEditAccount('${a.id}','${a.name.replace(/'/g,"\\'")}',${a.cash||0})">
        <span class="material-icons-round" style="font-size:16px">edit</span>
      </button>
      <button class="acc-del-btn" onclick="deleteAccount('${a.id}')">
        <span class="material-icons-round" style="font-size:16px">delete</span>
      </button>
    </div>`;
  }).join('');
}

window.startEditAccount = (id, currentName, currentCash) => {
  const row = document.getElementById('acc-row-' + id);
  if (!row) return;
  row.innerHTML = `
    <span class="acc-color-dot" style="background:${accColor(id)};flex-shrink:0;"></span>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;">
      <div>
        <div class="form-label">계좌명</div>
        <input class="form-input" id="edit-acc-name-${id}" value="${currentName}"
          style="padding:8px 10px;font-size:14px;"
          onkeydown="if(event.key==='Escape')renderAccountList()">
      </div>
      <div>
        <div class="form-label">예수금</div>
        <input class="form-input" id="edit-acc-cash-${id}" type="number" value="${currentCash||''}"
          placeholder="0" min="0"
          style="padding:8px 10px;font-size:14px;"
          onkeydown="if(event.key==='Escape')renderAccountList()">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" style="flex:1;padding:0;height:36px;font-size:13px;border-radius:8px;" onclick="saveAccount('${id}')">저장</button>
        <button class="btn btn-secondary" style="flex:1;padding:0;height:36px;font-size:13px;border-radius:8px;" onclick="renderAccountList()">취소</button>
      </div>
    </div>
  `;
  document.getElementById('edit-acc-name-' + id)?.focus();
};

window.saveAccount = async id => {
  const name = document.getElementById('edit-acc-name-' + id)?.value.trim();
  const cash = parseFloat(document.getElementById('edit-acc-cash-' + id)?.value) || 0;
  if (!name) { alert('계좌명을 입력하세요'); return; }
  if (accounts.find(a=>a.name===name && a.id!==id)) { alert('같은 이름의 계좌가 있어요'); return; }
  await updateDoc(doc(db,'users',uid,'invest_accounts',id), { name, cash });
  const idx = accounts.findIndex(a=>a.id===id);
  if (idx>=0) { accounts[idx].name = name; accounts[idx].cash = cash; }
  holdings.filter(h=>h.accountId===id).forEach(h=>{ h.accountName=name; });
  renderAccountList();
  renderAccountBar();
  renderAll();
};

window.addAccount = async () => {
  const name = document.getElementById('new-acc-name').value.trim();
  if (!name) { alert('계좌명을 입력하세요'); return; }
  if (accounts.find(a=>a.name===name)) { alert('같은 이름의 계좌가 있어요'); return; }
  const ref = await addDoc(accountsRef(), { name, createdAt: new Date().toISOString() });
  accounts.push({ id: ref.id, name });
  document.getElementById('new-acc-name').value = '';
  renderAccountList();
  renderAccountBar();
};

window.deleteAccount = async id => {
  const cnt = holdings.filter(h=>h.accountId===id).length;
  if (cnt > 0) { alert(`이 계좌에 종목이 ${cnt}개 있어요. 종목을 먼저 삭제하거나 다른 계좌로 변경해주세요.`); return; }
  if (!confirm('계좌를 삭제할까요?')) return;
  await deleteDoc(doc(db,'users',uid,'invest_accounts',id));
  accounts = accounts.filter(a=>a.id!==id);
  if (currentAccountFilter === id) currentAccountFilter = 'all';
  renderAccountList();
  renderAccountBar();
  renderAll();
};

// ── 탭 ──
window.switchTab = id => {
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id==='analysis') renderAnalysis();
};

// ── 종목 분류 필터 ──
window.filterHoldings = (f, btn) => {
  holdingCatFilter = f;
  document.querySelectorAll('#page-holdings .chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderHoldings();
};

// ── 모달 ──
window.closeModalById = id => document.getElementById(id).classList.remove('open');
window.closeModal = (e, id) => { if (e.target===e.currentTarget) closeModalById(id); };

// ── 테마 ──
window.toggleTheme = () => {
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('theme-icon').textContent = isDark?'dark_mode':'light_mode';
  localStorage.setItem('invest-theme', isDark?'light':'dark');
};
const savedTheme = localStorage.getItem('invest-theme');
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('theme-icon').textContent = savedTheme==='dark'?'light_mode':'dark_mode';
}

// ── 유틸 ──
function fmt(n) {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e8) return sign+(abs/1e8).toFixed(2)+'억원';
  return sign+numFmt(Math.round(abs))+'원';
}
function fmtCur(n, currency) {
  if (currency === 'USD') return '$' + numFmt(n);
  return numFmt(n) + '원';
}
function numFmt(n) { return Number(n).toLocaleString('ko-KR'); }
function pctFmt(n) { return n.toFixed(1)+'%'; }
function hashCode(s) { let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0; return h; }
function accColor(id) { return ACC_COLORS[Math.abs(hashCode(id))%ACC_COLORS.length]; }

// 마우스 드래그 스크롤 (데스크탑)
function enableDragScroll(el) {
  let isDragging = false, startX = 0, scrollLeft = 0;
  el.addEventListener('mousedown', e => {
    isDragging = true;
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
    el.style.cursor = 'grabbing';
    el.style.userSelect = 'none';
  });
  el.addEventListener('mouseleave', () => { isDragging = false; el.style.cursor = ''; });
  el.addEventListener('mouseup',    () => { isDragging = false; el.style.cursor = ''; el.style.userSelect = ''; });
  el.addEventListener('mousemove', e => {
    if (!isDragging) return;
    e.preventDefault();
    el.scrollLeft = scrollLeft - (e.pageX - el.offsetLeft - startX);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  const bar = document.getElementById('account-bar');
  if (bar) enableDragScroll(bar);
  // filter-row는 동적 렌더 전이므로 이벤트 위임
  document.addEventListener('mousedown', e => {
    const row = e.target.closest('.filter-row');
    if (row && !row._dragEnabled) { row._dragEnabled = true; enableDragScroll(row); }
  });
});
</script>
